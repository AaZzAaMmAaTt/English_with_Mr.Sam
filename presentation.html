<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentation - English with Mr.Sam</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="level-header">
  <div class="logo"><img src="assets/images/logo.png" alt="English with Mr.Sam"></div>
</header>

<main class="presentation-page" data-presentation-page>
  <section class="presentation-card">
    <div class="presentation-topbar">
      <h1 id="presentation-title" class="presentation-title">Lesson presentation</h1>
      <div class="presentation-actions">
        <a id="presentation-open-btn" href="#" class="btn lesson-nav-btn" target="_blank" rel="noopener" hidden>Open presentation</a>
        <a id="presentation-back-btn" href="lesson.html" class="btn lesson-nav-btn">Back to lesson</a>
      </div>
    </div>
    <p id="presentation-note" class="presentation-note"></p>
    <div class="presentation-frame-shell">
      <iframe id="presentation-frame" title="Lesson presentation" loading="lazy"></iframe>
    </div>
  </section>
</main>

<script src="js/presentations.js"></script>
<script src="js/script.js"></script>
</body>
</html>
