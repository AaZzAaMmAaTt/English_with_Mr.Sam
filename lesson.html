<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson - English with Mr.Sam</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="level-header">
  <div class="logo"><img src="assets/images/logo.png" alt="English with Mr.Sam"></div>
</header>

<main class="lesson-view-page" data-lesson-page>
  <section class="lesson-player-card">
    <h1 class="lesson-player-title" id="lesson-title">Theme: Lesson</h1>
    <div class="lesson-video-shell">
      <video id="lesson-video" controls preload="metadata" controlsList="nodownload noplaybackrate" disablePictureInPicture>
        <source id="lesson-video-source" src="assets/videos/a1-lesson1.mp4" type="video/mp4">
      </video>
      <div id="lesson-video-embed" class="lesson-video-embed" hidden></div>
      <button id="lesson-video-cover" class="lesson-video-cover" type="button" aria-label="Смотреть урок">
        <span class="lesson-video-cover-content">
          <span class="lesson-video-cover-play" aria-hidden="true"></span>
        </span>
      </button>
    </div>
    <div class="lesson-player-actions">
      <a id="go-tasks-btn" href="tasks.html?course=a1&lesson=1&open=quiz" class="btn lesson-nav-btn lesson-nav-btn-primary lesson-nav-btn-tasks">Go to tasks</a>
      <a id="lesson-presentation-btn" href="presentation.html?course=a1&lesson=1" class="btn lesson-nav-btn lesson-nav-btn-presentation">Lesson presentation</a>
      <button id="lesson-homework-btn" class="btn lesson-nav-btn lesson-nav-btn-homework" type="button">Homework</button>
      <a id="back-lessons-btn" href="a1.html" class="btn lesson-nav-btn lesson-nav-btn-back">Go to lessons</a>
    </div>
  </section>
</main>

<div id="homework-gate-modal" class="homework-gate-modal" aria-hidden="true">
  <div class="homework-gate-card" role="dialog" aria-modal="true" aria-labelledby="homework-gate-title">
    <h3 id="homework-gate-title">Please, do the lesson's tasks first</h3>
    <p>Complete the lesson tasks to unlock homework submission.</p>
    <div class="homework-gate-actions">
      <button id="homework-gate-tasks" type="button" class="btn lesson-nav-btn lesson-nav-btn-primary">Go to tasks</button>
      <button id="homework-gate-close" type="button" class="btn lesson-nav-btn">Close</button>
    </div>
  </div>
</div>

<script src="js/presentations.js"></script>
<script src="js/script.js"></script>
</body>
</html>
